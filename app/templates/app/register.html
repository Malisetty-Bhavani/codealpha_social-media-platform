<!DOCTYPE html>
<html>
<head>
    <title>ShareNext - Sign Up</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#f3f2ef;
        }

        .signup-box{
            width:400px;
            background:white;
            margin:60px auto;
            padding:40px;
            border-radius:12px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .logo{
            color:#0a66c2;
            font-size:42px;
            font-weight:bold;
            margin-bottom:10px;
        }

        h2{
            margin-bottom:30px;
            color:#333;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            background:#0a66c2;
            color:white;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#004182;
        }

        .login-link{
            margin-top:20px;
        }

        .login-link a{
            text-decoration:none;
            color:#0a66c2;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="signup-box">

    <div class="logo">
        ShareNext
    </div>

    <h2>Create Your Account</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password1" placeholder="Password" required>

        <input type="password" name="password2" placeholder="Confirm Password" required>

        <button type="submit">
            Sign Up
        </button>
    </form>

    <div class="login-link">
        Already have account?
        <a href="{% url 'login' %}">Login</a>
    </div>

</div>

</body>
</html>
