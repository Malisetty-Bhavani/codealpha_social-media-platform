<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>

    <style>

        body{
            background:#f3f2ef;
            font-family:Arial;
        }

        .post-box{
            width:500px;
            background:white;
            margin:50px auto;
            padding:30px;
            border-radius:12px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#0a66c2;
        }

        textarea{
            width:100%;
            height:120px;
            padding:15px;
            border-radius:8px;
            border:1px solid #ccc;
            margin-top:20px;
            font-size:16px;
        }

        input{
            margin-top:15px;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:14px;
            border:none;
            background:#0a66c2;
            color:white;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<div class="post-box">

    <h2>Create New Post</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <textarea
            name="content"
            placeholder="What's on your mind?"
            required
        ></textarea>

        <input type="file" name="image">

        <button type="submit">
            Post
        </button>

    </form>

</div>

</body>
</html>
