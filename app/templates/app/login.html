<!DOCTYPE html>
<html>
<head>
    <title>ShareNext Login</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#f3f2ef;
            font-family:Arial;
        }

        .login-box{
            width:400px;
            margin:70px auto;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .logo{
            font-size:42px;
            font-weight:bold;
            color:#0a66c2;
            margin-bottom:15px;
        }

        h2{
            color:#333;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            background:#0a66c2;
            color:white;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#004182;
        }

        .register-link{
            margin-top:20px;
        }

        .register-link a{
            text-decoration:none;
            color:#0a66c2;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        ShareNext
    </div>

    <h2>Login to Your Account</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">
            Login
        </button>
    </form>

    <div class="register-link">
        Don't have an account?
        <a href="{% url 'register' %}">
            Create Account
        </a>
    </div>

</div>

</body>
</html>
