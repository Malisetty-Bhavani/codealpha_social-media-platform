{% load static %}

{% extends 'app/base.html' %}

{% block content %}

<h2>All Posts</h2>

{% for post in posts %}
<div class="post">

    <b>{{ post.user.username }}</b>

    <img src="{{ post.image.url }}">

    <p>{{ post.caption }}</p>

    {% if request.user != post.user %}
        <a href="{% url 'profile' post.user.username %}">
            Follow / View Profile
        </a>
    {% endif %}

</div>
{% endfor %}

{% endblock %}
